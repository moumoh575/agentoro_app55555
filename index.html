<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentoro Live Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .chat-container { height: calc(100vh - 120px); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6 glass p-4 rounded-2xl">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <h1 class="font-bold text-xl tracking-tighter">AGENTORO <span class="text-blue-400">v2.0</span></h1>
            </div>
            <div id="status" class="text-xs font-mono text-gray-400">CONNECTING...</div>
        </div>

        <div class="glass rounded-3xl overflow-hidden shadow-2xl">
            <div id="chat-feed" class="chat-container overflow-y-auto p-6 space-y-6 bg-slate-900/50">
                <div class="text-center text-gray-500 mt-10">Waiting for incoming messages...</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchLogs() {
            const feed = document.getElementById('chat-feed');
            const status = document.getElementById('status');
            
            try {
                const response = await fetch('https://agentoro.shop/get-logs');
                const data = await response.json();
                
                if (!data || data.length === 0) return;

                // منطق الدمج الذكي: إذا كانت الرسالة والرد وصلا في نفس الوقت تقريباً، نضعهما معاً
                let combinedHTML = '';
                
                // نعكس البيانات لنرى الأحدث بالأسفل
                const sortedLogs = data; 

                sortedLogs.forEach((log, index) => {
                    // رسالة الزبون
                    combinedHTML += `
                        <div class="flex flex-col items-start fade-in">
                            <div class="flex items-center gap-2 mb-1">
                                <img src="https://ui-avatars.com/api/?name=User&background=64748b&color=fff" class="w-5 h-5 rounded-full">
                                <span class="text-[10px] font-bold text-gray-400 uppercase">Customer</span>
                            </div>
                            <div class="bg-white text-slate-900 p-4 rounded-2xl rounded-bl-none max-w-[80%] shadow-lg text-sm">
                                ${log.message}
                                <div class="text-[9px] text-gray-400 mt-2">${log.time || ''}</div>
                            </div>
                        </div>
                    `;

                    // إذا كان هناك رد (Status) من الـ AI في نفس السجل
                    if (log.status && log.status !== "Thinking...") {
                        combinedHTML += `
                            <div class="flex flex-col items-end fade-in">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[10px] font-bold text-blue-400 uppercase">AI Agent (Amira)</span>
                                    <div class="w-5 h-5 bg-blue-600 rounded-full flex items-center justify-center text-[10px]">🤖</div>
                                </div>
                                <div class="bg-blue-600 text-white p-4 rounded-2xl rounded-br-none max-w-[80%] shadow-lg shadow-blue-900/20 text-sm">
                                    ${log.status}
                                    <div class="text-[9px] text-blue-200 mt-2">${log.time || ''}</div>
                                </div>
                            </div>
                        `;
                    }
                });

                feed.innerHTML = combinedHTML;
                feed.scrollTop = feed.scrollHeight;
                status.innerText = "LIVE • LAST UPDATE: " + new Date().toLocaleTimeString();
            } catch (err) {
                status.innerText = "OFFLINE • RETRYING...";
                console.error(err);
            }
        }

        // تشغيل التحديث التلقائي فوراً
        fetchLogs();
        setInterval(fetchLogs, 3000);
    </script>
</body>
</html>
